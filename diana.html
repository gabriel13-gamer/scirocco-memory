<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana 🤍</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container diana-page">

<h1 class="title">Diana 🤍</h1>

<p class="text-box">
🤍 Aqui vão as frases por cada ano da minha vida canina contigo!
</p>

<div class="card">

<p id="texto" class="text-box"></p>

<div id="foto" class="gallery-container"></div>

<div class="nav-buttons">
  <button onclick="anterior()">⬅️</button>
  <button onclick="proxima()">➡️</button>
</div>

<button onclick="surpresa()" class="surpresa-btn">
🤍 surpresa
</button>
  
</div>

<div class="album-button">
  <button onclick="location.href='index.html'">🏠 Voltar</button>
</div>

</main>

<script src="diana.js"></script>

<script>
let atual = 0;

function mostrar() {
  document.getElementById("texto").innerText = frases[atual];

  let foto = "";

  if (atual === 5) {
    foto = `<img src="images/diana_passeio.jpg" alt="Diana">`;
  }

  document.getElementById("foto").innerHTML = foto;
}

function proxima() {
  if (atual < frases.length - 1) {
    atual++;
    mostrar();
  }
}

function anterior() {
  if (atual > 0) {
    atual--;
    mostrar();
  }
}

mostrar();
</script>

</body>
</html>
