<body>

<h1>Diana 🤍</h1>

<div class="card">

<button onclick="anterior()">
⬅️
</button>

<button onclick="proxima()">
➡️
</button>

</div>

<script src="diana.js"></script>

<script>

let atual = 0;

function mostrar(){

document.getElementById("texto")
.innerText = frases[atual];

let foto = "";

if(atual===5){

foto =
'<img src="images/diana_passeio.jpg" width="300">';

}

document.getElementById("foto")
.innerHTML = foto;

}

function proxima(){

if(atual < frases.length-1){

atual++;

mostrar();

}

}

function anterior(){

if(atual > 0){

atual--;

mostrar();

}

}

mostrar();

</script>
