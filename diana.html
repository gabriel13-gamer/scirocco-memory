<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana 🤍</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">

<h1 class="title">Diana 🤍</h1>

<p class="text-box">
🤍 Aqui vão as frases por cada ano da minha vida canina contigo!
</p>

<div class="card">

<p id="texto"></p>

<div id="foto" class="gallery-container"></div>

<div class="nav-buttons">
  <button onclick="anterior()">⬅️</button>
  <button onclick="proxima()">➡️</button>
</div>

<!-- BOTÃO SURPRESA (antigo estilo simples) -->
<button onclick="surpresa()" class="surpresa-btn" id="btnSurpresa" style="display:none;">
🤍 surpresa
</button>

</div>

<div class="album-button">
  <button onclick="location.href='index.html'">🏠 Voltar</button>
</div>

</main>

<script src="diana.js"></script>

<script>
let atual = 0;

function mostrar() {
  document.getElementById("texto").innerText = frases[atual];

  let foto = "";

  if (atual === 5) {
    foto = `<img src="images/diana_passeio.jpg">`;
  }

  document.getElementById("foto").innerHTML = foto;

  // mostrar botão só no fim
  const btn = document.getElementById("btnSurpresa");
  if (atual === frases.length - 1) {
    btn.style.display = "inline-block";
  } else {
    btn.style.display = "none";
  }
}

function proxima() {
  if (atual < frases.length - 1) {
    atual++;
    mostrar();
  }
}

function anterior() {
  if (atual > 0) {
    atual--;
    mostrar();
  }
}

// SURPRESA (simples antiga)
function surpresa() {
  alert("🤍 Uma memória especial");

  const imgs = [
    "images/diana1.jpg",
    "images/diana2.jpg",
    "images/diana3.jpg",
    "images/diana4.jpg",
    "images/diana5.jpg",
    "images/diana_passeio.jpg"
  ];

  const randomImg = imgs[Math.floor(Math.random() * imgs.length)];

  document.getElementById("foto").innerHTML = `
    <img src="${randomImg}" style="width:100%;max-width:500px;border-radius:15px;">
  `;
}

mostrar();
</script>

</body>
</html>
