<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana 🤍</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">

<h1 class="title">Diana 🤍</h1>

<p id="texto" class="text-box"></p>

<div class="card">

<div id="foto"></div>

<div class="nav-buttons">
  <button onclick="anterior()">⬅️</button>
  <button onclick="proxima()">➡️</button>
</div>

<button onclick="surpresa()" class="surpresa-btn">
🤍 surpresa
</button>
  
</div>

</main>

<script>
let atual = 0;

const frases = [
  "🤍 Aqui vão as frases por cada ano da minha vida canina contigo!",
  "Este foi o ano em que entrei na tua vida...",
  "Descobri o mundo contigo...",
  "Cresci contigo e aprendi a confiar em ti...",
  "Ano cheio de brincadeiras e amor...",
  "Passeios contigo eram sempre especiais...",
  "Os anos passaram mas o amor ficou...",
  "Obrigado por tudo o que vivemos juntos..."
];

const imagens = [
  "images/diana1.jpg",
  "images/diana2.jpg",
  "images/diana3.jpg",
  "images/diana4.jpg",
  "images/diana5.jpg",
  "images/diana_passeio.jpg"
];

function mostrar() {
  document.getElementById("texto").innerText = frases[atual];

  let foto = "";

  if (atual === 5) {
    foto = `<img src="images/diana_passeio.jpg">`;
  }

  document.getElementById("foto").innerHTML = foto;

  if (atual === frases.length - 1) {
    if (!document.getElementById("btnSurpresa")) {
      const btn = document.createElement("button");
      btn.innerText = "🤍 surpresa";
      btn.className = "surpresa-btn";
      btn.id = "btnSurpresa";
      btn.onclick = surpresa;

      document.querySelector(".card").appendChild(btn);
    }
  }
}

function proxima() {
  if (atual < frases.length - 1) {
    atual++;
    mostrar();
  }
}

function anterior() {
  if (atual > 0) {
    atual--;
    mostrar();
  }
}

function surpresa() {
  const randomImg = imagens[Math.floor(Math.random() * imagens.length)];

  document.querySelector(".card").innerHTML = `
    <div class="surpresa-view">

      <h2>🤍 Uma memória especial</h2>

      <p>${frases[frases.length - 1]}</p>

      <img src="${randomImg}">

      <button class="ver-album-btn" onclick="location.href='album.html'">
        📸 Ver álbum
      </button>

    </div>
  `;
}

mostrar();
</script>

</body>
</html>
