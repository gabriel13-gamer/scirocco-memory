<script>
let atual = 0;

const imagens = [
  "images/papa1.jpg",
  "images/papa2.jpg",
  "images/papa3.jpg",
  "images/papa4.jpg",
  "images/papa_passeio.jpg"
];

function mostrar() {
  document.getElementById("texto").innerText = frases[atual];

  let foto = "";

  if (atual === 4) {
    foto = `<img src="images/papa_passeio.jpg" width="350">`;
  }

  document.getElementById("foto").innerHTML = foto;

  // botão surpresa só no fim
  if (atual === frases.length - 1) {
    if (!document.getElementById("btnSurpresa")) {
      const btn = document.createElement("button");
      btn.innerText = "🤍 surpresa";
      btn.className = "surpresa-btn";
      btn.id = "btnSurpresa";
      btn.onclick = surpresa;

      document.querySelector(".card").appendChild(btn);
    }
  }
}

function proxima() {
  if (atual < frases.length - 1) {
    atual++;
    mostrar();
  }
}

function anterior() {
  if (atual > 0) {
    atual--;
    mostrar();
  }
}

// SURPRESA (ALEATÓRIA)
function surpresa() {
  const randomImg = imagens[Math.floor(Math.random() * imagens.length)];

  document.querySelector(".card").innerHTML = `
    <div class="surpresa-view">

      <h2>🤍 Uma memória especial</h2>

      <p>${frases[frases.length - 1]}</p>

      <img src="${randomImg}">

      <button class="ver-album-btn" onclick="location.href='album.html'">
        📸 Ver álbum
      </button>

    </div>
  `;
}

mostrar();
</script>
