<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papá 🤍</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">

<h1 class="title">Papá 🤍</h1>

<p class="text-box"></p>

<div class="card">

<p id="texto"></p>

<div id="foto"></div>

<div class="nav-buttons">
  <button onclick="anterior()">⬅️</button>
  <button onclick="proxima()">➡️</button>
</div>

<!-- BOTÃO SURPRESA ANTIGO -->
<button onclick="surpresa()" class="surpresa-btn" id="btnSurpresa" style="display:none;">
🤍 surpresa
</button>

</div>

<div class="album-button">
  <button onclick="location.href='index.html'">🏠 Voltar</button>
</div>

</main>

<script src="papa.js"></script>

<script>
let atual = 0;

function mostrar() {
  document.getElementById("texto").innerText = frases[atual];

  let foto = "";

  if (atual === 4) {
    foto = `<img src="images/papa_passeio.jpg" width="350">`;
  }

  document.getElementById("foto").innerHTML = foto;

  const btn = document.getElementById("btnSurpresa");

  if (atual === frases.length - 1) {
    btn.style.display = "inline-block";
  } else {
    btn.style.display = "none";
  }
}

function proxima() {
  if (atual < frases.length - 1) {
    atual++;
    mostrar();
  }
}

function anterior() {
  if (atual > 0) {
    atual--;
    mostrar();
  }
}

// SURPRESA ANTIGA
function surpresa() {
  alert("🤍 Memória especial");

  const imgs = [
    "images/papa1.jpg",
    "images/papa2.jpg",
    "images/papa3.jpg",
    "images/papa4.jpg",
    "images/papa_passeio.jpg"
  ];

  const randomImg = imgs[Math.floor(Math.random() * imgs.length)];

  document.getElementById("foto").innerHTML = `
    <img src="${randomImg}" style="width:100%;max-width:500px;border-radius:15px;">
  `;
}

mostrar();
</script>

</body>
</html>
