<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papá 🤍</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">

<h1 class="title">Papá 🤍</h1>

<p id="texto" class="text-box"></p>

<div class="card">

<div id="foto"></div>

<div class="nav-buttons">
  <button onclick="anterior()">⬅️</button>
  <button onclick="proxima()">➡️</button>
</div>

</div>

</main>

<script>
let atual = 0;

const frases = [
  "🤍 Olá! Aqui ficam algumas palavras minhas para ti.",
  "Mesmo chegando mais tarde na minha vida...",
  "Obrigado por me tratares com carinho...",
  "Os nossos momentos foram especiais...",
  "Passeios contigo eram importantes...",
  "Obrigado por tudo o que vivemos...",
  "Levo contigo todas as memórias..."
];

const imagens = [
  "images/papa1.jpg",
  "images/papa2.jpg",
  "images/papa3.jpg",
  "images/papa4.jpg",
  "images/papa_passeio.jpg"
];

function mostrar() {
  document.getElementById("texto").innerText = frases[atual];

  let foto = "";

  if (atual === 4) {
    foto = `<img src="images/papa_passeio.jpg" width="350">`;
  }

  document.getElementById("foto").innerHTML = foto;

  if (atual === frases.length - 1) {
    if (!document.getElementById("btnSurpresa")) {
      const btn = document.createElement("button");
      btn.innerText = "🤍 surpresa";
      btn.className = "surpresa-btn";
      btn.id = "btnSurpresa";
      btn.onclick = surpresa;

      document.querySelector(".card").appendChild(btn);
    }
  }
}

function proxima() {
  if (atual < frases.length - 1) {
    atual++;
    mostrar();
  }
}

function anterior() {
  if (atual > 0) {
    atual--;
    mostrar();
  }
}

function surpresa() {
  const randomImg = imagens[Math.floor(Math.random() * imagens.length)];

  document.querySelector(".card").innerHTML = `
    <div class="surpresa-view">

      <h2>🤍 Uma memória especial</h2>

      <p>${frases[frases.length - 1]}</p>

      <img src="${randomImg}">

      <button class="ver-album-btn" onclick="location.href='album.html'">
        📸 Ver álbum
      </button>

    </div>
  `;
}

mostrar();
</script>

</body>
</html>
